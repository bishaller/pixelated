<html lang="en">

<title>Pixel Bishal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: 'Press Start 2P', monospace;
    color: #e0e0e0;
    gap: 24px;
    padding: 32px;
  }

  h1 {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #6a6a8e;
  }

  .canvas-wrapper {
    position: relative;
    padding: 6px;
    background: #0d0d1a;
    border: 3px solid #2a2a4e;
    box-shadow:
      0 0 0 3px #0d0d1a,
      0 0 40px rgba(100, 100, 180, 0.1);
  }

  .pixel-grid {
    display: grid;
    grid-template-columns: repeat(48, 10px);
    grid-template-rows: repeat(48, 10px);
    gap: 1px;
    background: #0d0d1a;
    image-rendering: pixelated;
  }

  .px {
    width: 10px;
    height: 10px;
    transition: transform 0.1s ease;
  }

  .px:hover {
    transform: scale(1.3);
    z-index: 2;
    outline: 1px solid rgba(255,255,255,0.3);
  }

  /* Grayscale palette — 6 shades */
  .c0 { background: #08080f; } /* black */
  .c1 { background: #2e2e40; } /* dark */
  .c2 { background: #5e5e72; } /* mid-dark */
  .c3 { background: #9090a4; } /* mid-light */
  .c4 { background: #c4c4d2; } /* light */
  .c5 { background: #f0f0f5; } /* white */

  .label {
    font-size: 8px;
    color: #4a4a6e;
    letter-spacing: 2px;
  }
</style>
</head>
