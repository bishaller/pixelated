// Decode
const shades = rleDecode(SHADE_RLE);
const hairs = rleDecode(HAIR_RLE);

// Create ImageData
const imgData = ctx.createImageData(SIZE, SIZE);
let mode = 'normal';

function render() {
  const d = imgData.data;
  for (let i = 0; i < SIZE * SIZE; i++) {
    const s = parseInt(shades[i]);
    const h = hairs[i] === '1';
    const idx = i * 4;
    let r, g, b, a = 255;

    if (mode === 'normal') {
      const pal = h ? PAL_HAIR : PAL;
      [r, g, b] = pal[s];
    } else if (mode === 'mask') {
      if (h) {
        [r, g, b] = PAL_MASK_HAIR;
      } else {
        const [pr, pg, pb] = PAL[s];
        r = Math.round(pr * PAL_MASK_DIM);
        g = Math.round(pg * PAL_MASK_DIM);
        b = Math.round(pb * PAL_MASK_DIM);
      }
    } else if (mode === 'invert') {
      const inv = 5 - s;
      const pal = h ? PAL_HAIR : PAL;
      [r, g, b] = pal[inv];
    } else if (mode === 'haironly') {
      if (h) {
        const pal = PAL_HAIR;
        [r, g, b] = pal[s];
      } else {
        r = g = b = 10;  // near black background
      }
    }

    d[idx] = r;
    d[idx + 1] = g;
    d[idx + 2] = b;
    d[idx + 3] = a;
  }
  ctx.putImageData(imgData, 0, 0);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.getElementById({
    normal: 'btnNormal',
    mask: 'btnMask',
    invert: 'btnInvert',
    haironly: 'btnHairOnly'
  }[m]).classList.add('active');
  render();
}

// Mouse tracking
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scale = SIZE / rect.width;
  const x = Math.floor((e.clientX - rect.left) * scale);
  const y = Math.floor((e.clientY - rect.top) * scale);
  if (x >= 0 && x < SIZE && y >= 0 && y < SIZE) {
    const i = y * SIZE + x;
    const s = shades[i];
    const h = hairs[i] === '1';
    document.getElementById('coord').textContent =
      `(${x}, ${y})  shade: ${s}  ${h ? '◼ hair' : '◻ bg'}`;
  }
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('coord').textContent = '';
});

render();
</script>
